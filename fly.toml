# fly.toml app configuration file generated for medicine-scheduler-api on 2026-03-21T16:00:47-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'medicine-scheduler-api'
primary_region = 'gru'

[build]

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'

[[mounts]]
  source = 'medicine_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256